name: ISOInspector Code Coverage

on:
  pull_request:
    branches:
      - main
      - "**"
    paths:
      - 'Sources/**/*.swift'
      - 'Tests/**/*.swift'
      - 'Package.swift'
      - 'Package.resolved'
      - 'scripts/isoinspector_coverage.py'
      - '.github/workflows/isoinspector-coverage.yml'
  push:
    branches:
      - main
    paths:
      - 'Sources/**/*.swift'
      - 'Tests/**/*.swift'
      - 'Package.swift'
      - 'Package.resolved'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spm-coverage:
    name: Coverage - SPM (macOS)
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests with coverage
        # Skip ISOInspectorPerformanceTests — those are timing-sensitive
        # benchmarks that are flaky on shared CI runners and are covered by
        # the dedicated performance-regression.yml workflow.
        run: swift test --enable-code-coverage --skip ISOInspectorPerformanceTests

      - name: Compute per-module coverage and enforce thresholds
        id: coverage
        run: |
          python3 scripts/isoinspector_coverage.py \
            --kit 85 --app 40 --cli 80 \
            --json coverage-isoinspector.json \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: isoinspector-coverage
          path: coverage-isoinspector.json
          if-no-files-found: warn
          retention-days: 30
